<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a5c34" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GiftShop Pro" />
  <link rel="manifest" href="manifest.json" />
  <title>🧸 GiftShop Inventory Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root,
    [data-theme="light"] {
      --bg: #f5f3ef;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-2: #faf9f6;
      --surface-off: #f2f0eb;
      --divider: #e8e4dc;
      --border: #d8d4cc;
      --text: #1a1714;
      --text-muted: #6e655b;
      --text-faint: #a0988e;
      --primary: #1e6b3a;
      --primary-bright: #288a4c;
      --primary-lt: #edf7f0;
      --danger: #c0392b;
      --warn: #e67e22;
      --info: #2471a3;
      --accent: #8e6b3e;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.04);
      --shadow-md: 0 8px 24px rgba(0,0,0,.07);
      --shadow-lg: 0 18px 45px rgba(0,0,0,.09);
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 26px;
      --r-full: 9999px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --xs: 0.7rem;
      --sm: 0.8rem;
      --base: 0.9rem;
      --lg: 1.05rem;
      --xl: 1.2rem;
      --2xl: 1.4rem;
    }
    [data-theme="dark"] {
      --bg: #11100d;
      --surface: rgba(24,23,20,0.85);
      --surface-2: #1e1c18;
      --surface-off: #2a2722;
      --divider: #302d27;
      --border: #3a3630;
      --text: #e8e5df;
      --text-muted: #8a8278;
      --text-faint: #5a5550;
      --primary: #3d9a5c;
      --primary-bright: #4cb870;
      --primary-lt: #152618;
      --danger: #e74c3c;
      --warn: #f0a04b;
      --info: #5dade2;
      --accent: #b8945e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: none; -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }
    body {
      font-family: var(--font);
      font-size: var(--base);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: radial-gradient(ellipse at 30% 60%, rgba(45,125,70,0.06) 0%, transparent 55%),
                        radial-gradient(ellipse at 70% 25%, rgba(180,140,80,0.04) 0%, transparent 50%);
      transition: background .3s;
      overscroll-behavior-y: none;
      -webkit-user-select: none;
      user-select: none;
    }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    input, select { font: inherit; color: inherit; outline: none; }
    #shell {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: transparent;
      position: relative;
      box-shadow: var(--shadow-lg);
      border-radius: 0;
    }
    @media (min-width: 481px) { #shell { border-radius: 28px; margin: 12px; min-height: calc(100dvh - 24px); max-height: calc(100dvh - 24px); } }
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }
    .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--divider); position: sticky; top: 0; z-index: 100; min-height: 44px;
    }
    .header-brand { font-size: var(--lg); font-weight: 900; color: var(--primary); }
    .header-file {
      display: flex; align-items: center; gap: 4px; font-size: var(--xs); font-weight: 600;
      color: var(--text-muted); padding: 4px 12px; background: var(--surface-2); border-radius: var(--r-full);
      border: 1px solid var(--divider); max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer;
    }
    .header-actions { display: flex; gap: 2px; }
    .btn-icon {
      width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      background: transparent; font-size: 16px; color: var(--text-muted); transition: .2s;
    }
    .btn-icon:active { background: var(--divider); transform: scale(.9); }
    .header-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 2px solid var(--divider); }

    .file-dropdown {
      position: absolute; top: calc(100% + 4px); left: 50%; transform: translateX(-50%);
      background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 12px; width: calc(100% - 24px); max-width: 340px;
      box-shadow: var(--shadow-md); z-index: 200; display: none;
    }
    .file-dropdown.open { display: block; }
    .file-select { width: 100%; padding: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-md); font-size: var(--sm); }
    .btn-load { width: 100%; margin-top: 8px; padding: 10px; background: var(--primary); color: #fff; border-radius: var(--r-md); font-weight: 700; }

    .cat-filter-wrap {
      padding: 4px 8px; background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--divider); display: flex; gap: 4px; overflow-x: auto;
      scrollbar-width: none; align-items: center; flex-shrink: 0;
    }
    .cat-chip {
      padding: 4px 10px; background: var(--surface-2); border: 1px solid var(--divider);
      border-radius: var(--r-full); font-size: 0.65rem; font-weight: 600; white-space: nowrap;
      color: var(--text-muted); cursor: pointer; transition: .2s;
    }
    .cat-chip.active { background: var(--primary-lt); border-color: var(--primary); color: var(--primary); }

    .swipe-zone {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px 10px; overflow: hidden; gap: 4px;
    }
    .card-stack { position: relative; width: 100%; max-width: 400px; flex-shrink: 0; }
    .card-stack::before, .card-stack::after {
      content: ''; position: absolute; inset: 0; background: var(--surface); border-radius: var(--r-xl);
      border: 1px solid var(--divider); backdrop-filter: blur(10px);
    }
    .card-stack::before { transform: rotate(-2deg) translateY(4px); z-index: 0; opacity: .4; }
    .card-stack::after { transform: rotate(1.5deg) translateY(2px); z-index: 1; opacity: .6; }
    .inv-card {
      position: relative; z-index: 10; background: var(--surface); backdrop-filter: blur(20px);
      border-radius: var(--r-xl); padding: 12px 12px 10px; width: 100%;
      border: 1px solid rgba(255,255,255,0.3); box-shadow: var(--shadow-md);
      touch-action: pan-y; will-change: transform; max-height: none; overflow: hidden;
      transition: transform .45s cubic-bezier(.34,1.56,.64,1), opacity .35s ease;
    }
    [data-theme="dark"] .inv-card { border-color: rgba(255,255,255,0.05); }
    .inv-card.low-stock { border-color: rgba(230,126,34,0.5); }
    .swipe-ind {
      position: absolute; top: 12px; padding: 3px 12px; border-radius: var(--r-full); font-size: 0.7rem;
      font-weight: 700; opacity: 0; pointer-events: none; z-index: 20;
    }
    .swipe-ind.save { right: 10px; background: var(--primary-lt); color: var(--primary); }
    .swipe-ind.skip { left: 10px; background: #fdf0ef; color: var(--danger); }

    .card-cat-pill { display: inline-flex; align-items: center; gap: 3px; background: var(--surface-2); border: 1px solid var(--divider); border-radius: 20px; padding: 2px 8px; font-size: 0.6rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .low-stock-badge { background: #fef9f3; border: 1px solid var(--warn); color: var(--warn); border-radius: 20px; padding: 1px 6px; font-size: 0.55rem; font-weight: 700; margin-left: 4px; }
    .card-name-row { display: flex; align-items: center; margin-bottom: 6px; gap: 4px; }
    .prod-icon { width: 28px; height: 28px; border-radius: 50%; color: #fff; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; margin-right: 6px; }
    .card-prod-name { font-size: var(--xl); font-weight: 800; line-height: 1.2; flex: 1; }
    .history-box { background: var(--surface-2); border: 1px solid var(--divider); border-radius: var(--r-sm); padding: 4px 8px; font-size: 0.6rem; color: var(--text-muted); margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 3px; }
    .hist-tag { background: var(--surface); border: 1px solid var(--divider); border-radius: 20px; padding: 1px 6px; font-size: 0.55rem; }

    .card-stats { display: flex; gap: 3px; margin-bottom: 6px; }
    .stat-chip { flex: 1; background: var(--surface-2); border: 1px solid var(--divider); border-radius: var(--r-sm); padding: 4px 4px; text-align: center; }
    .stat-label { font-size: 0.5rem; color: var(--text-muted); text-transform: uppercase; }
    .stat-val { font-size: 0.8rem; font-weight: 700; }

    .quick-presets { display: flex; gap: 3px; margin-bottom: 6px; align-items: center; }
    .preset-chip { padding: 2px 8px; background: var(--surface-off); border: 1px solid var(--divider); border-radius: 20px; font-size: 0.6rem; font-weight: 600; color: var(--text-muted); cursor: pointer; }
    .preset-chip:active { background: var(--primary); color: #fff; transform: scale(.9); }

    .inp-row { display: flex; gap: 6px; margin-bottom: 4px; }
    .inp-col { flex: 1; }
    .inp-col-label { font-size: 0.55rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; text-align: center; margin-bottom: 2px; }
    .inp-wrap-sm { display: flex; align-items: center; background: var(--surface-2); border: 1.5px solid var(--border); border-radius: var(--r-sm); overflow: hidden; }
    .stepper-btn { width: 28px; height: 32px; background: transparent; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
    .card-input { flex: 1; padding: 6px 2px; background: transparent; border: none; font-size: 0.9rem; font-weight: 700; text-align: center; }
    .cost-preview { font-size: 0.6rem; color: var(--text-faint); text-align: right; margin-bottom: 6px; }
    .card-btns { display: flex; gap: 6px; }
    .btn-skip-c { flex: 1; padding: 10px 0; background: var(--surface-off); border: 1px solid var(--divider); border-radius: 30px; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }
    .btn-save-c { flex: 2; padding: 10px 0; background: var(--primary); border-radius: 30px; font-size: 0.8rem; font-weight: 700; color: #fff; box-shadow: 0 4px 12px rgba(30,107,58,.2); }

    .progress-section { padding: 4px 12px; background: var(--surface); border-top: 1px solid var(--divider); }
    .progress-track { height: 4px; background: var(--surface-off); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width .5s; }
    .progress-label { font-size: 0.6rem; text-align: center; color: var(--text-muted); margin-top: 2px; }

    .action-bar { padding: 6px 12px 8px; display: flex; flex-direction: column; gap: 4px; }
    .btn-generate, .btn-csv { width: 100%; padding: 10px; border-radius: 30px; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-generate { background: var(--text); color: var(--bg); }
    .btn-csv { background: var(--surface-2); color: var(--text); border: 1px solid var(--divider); }

    .tab-bar { display: flex; background: var(--surface); backdrop-filter: blur(30px); border-top: 1px solid var(--divider); padding: 3px 3px env(safe-area-inset-bottom); position: sticky; bottom: 0; z-index: 100; }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 5px 4px; font-size: 0.55rem; font-weight: 600; color: var(--text-faint); border-radius: var(--r-sm); transition: .2s; }
    .tab-btn.active { color: var(--primary); }
    .tab-btn .tab-icon { font-size: 18px; }

    .review-view, .summary-view { flex: 1; overflow-y: auto; padding: 10px; }
    .summary-kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--divider); border-radius: var(--r-md); padding: 10px; text-align: center; }
    .kpi-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }
    .kpi-value { font-size: 1.2rem; font-weight: 800; }

    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 8px 16px; border-radius: 30px; font-size: 0.8rem; font-weight: 600; opacity: 0; pointer-events: none; transition: .2s; z-index: 500; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }
    .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .loading-overlay.hidden { display: none; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--divider); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .undo-bar { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 8px 16px; border-radius: 30px; font-size: 0.8rem; display: flex; gap: 8px; opacity: 0; pointer-events: none; z-index: 400; transition: .2s; }
    .undo-bar.show { opacity: 1; pointer-events: auto; }
    .btn-undo { color: var(--primary-bright); font-weight: 800; }
  </style>
</head>
<body>
  <div id="shell">
    <div class="loading-overlay hidden" id="loading-overlay"><div class="spinner"></div></div>
    <div class="toast" id="toast"></div>
    <div class="undo-bar" id="undo-bar"><span id="undo-msg"></span><button class="btn-undo" id="undo-btn">↩ Undo</button></div>

    <div id="login-screen" class="screen active" style="align-items:center;justify-content:center;padding:24px;">
      <div style="background:var(--surface);backdrop-filter:blur(20px);border-radius:28px;padding:40px 24px;text-align:center;max-width:360px;width:100%;box-shadow:var(--shadow-lg);">
        <div style="font-size:56px;">🧸</div>
        <h1 style="font-size:1.8rem;font-weight:900;">GiftShop Pro</h1>
        <p style="color:var(--text-muted);margin:12px 0 28px;font-size:0.9rem;">Sign in to access inventory files.</p>
        <button id="login-btn" style="width:100%;padding:14px;background:var(--text);color:var(--bg);border-radius:40px;font-weight:700;font-size:1rem;">Sign in with Google</button>
      </div>
    </div>

    <div id="app-screen" class="screen">
      <header class="app-header">
        <div class="header-brand">🧸 Pro</div>
        <div class="header-file" id="header-file"><span id="file-status-text">Select File</span> ▾</div>
        <div class="header-actions">
          <img id="user-avatar" class="header-avatar" src="" style="display:none" />
          <button class="btn-icon" data-theme-toggle>🌙</button>
          <button class="btn-icon" id="logout-btn">⏻</button>
        </div>
        <div class="file-dropdown" id="file-dropdown">
          <select id="file-list" class="file-select"><option value="">— Choose from Drive —</option></select>
          <button id="load-btn" class="btn-load" disabled>Load</button>
        </div>
      </header>

      <div class="cat-filter-wrap" id="cat-filter-bar" style="display:none"></div>

      <div class="quick-stats-bar" id="quick-stats-bar" style="display:none;padding:3px 8px;background:var(--surface);border-bottom:1px solid var(--divider);display:flex;gap:4px;font-size:0.55rem;">
        <span class="qs-val green" id="qs-saved">0</span> saved · <span id="qs-value">$0</span> · <span id="qs-avg">—</span> avg · <span class="qs-val warn" id="qs-low">0</span> low
      </div>

      <div class="view active" id="view-swipe">
        <div class="swipe-zone" id="swipe-zone"></div>
        <div class="progress-section"><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div><span class="progress-label" id="progress-label">0 / 0</span></div>
        <div class="action-bar">
          <button id="generate-btn" class="btn-generate" disabled>📦 Generate Report</button>
          <button id="csv-btn" class="btn-csv" disabled>📥 Export CSV</button>
          <div id="report-result" class="report-result" style="display:none;"></div>
        </div>
      </div>

      <div class="view" id="view-review"><div class="review-view" id="review-content"></div></div>
      <div class="view" id="view-summary"><div class="summary-view" id="summary-content"></div></div>

      <nav class="tab-bar">
        <button class="tab-btn active" data-tab="swipe"><span class="tab-icon">🃏</span>Swipe</button>
        <button class="tab-btn" data-tab="review"><span class="tab-icon">📋</span>Review</button>
        <button class="tab-btn" data-tab="summary"><span class="tab-icon">📊</span>Summary</button>
      </nav>
    </div>
  </div>

  <script>
    (function() {
      const GOOGLE_CLIENT_ID = '397533113348-geurcc1e124egnn2ttf20epub2ero4vo.apps.googleusercontent.com';
      const SCOPES = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email';
      const AUTOSAVE_KEY = 'giftshop_autosave_v2';
      const HISTORY_KEY = 'giftshop_history';
      const THEME_KEY = 'giftshop_theme';

      let tokenClient, accessToken, userInfo, driveFiles=[], items=[], currentIndex=0, results={}, currentFileId=null;
      let activeCategory='All', undoStack=[], selectedReviewItems=new Set(), isProcessing=false;
      let summaryChart=null;

      const $ = id => document.getElementById(id);
      const showLoading=()=>$('loading-overlay').classList.remove('hidden');
      const hideLoading=()=>$('loading-overlay').classList.add('hidden');
      let toastTimer;
      function toast(msg){ clearTimeout(toastTimer); $('toast').textContent=msg; $('toast').classList.add('show'); toastTimer=setTimeout(()=>$('toast').classList.remove('show'),2000); }

      // Theme
      (function(){
        const html=document.documentElement; let theme='light';
        try{ theme=localStorage.getItem(THEME_KEY)||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'); }catch(e){}
        html.setAttribute('data-theme',theme);
        document.addEventListener('click',e=>{ if(e.target.closest('[data-theme-toggle]')){ theme=theme==='dark'?'light':'dark'; html.setAttribute('data-theme',theme); localStorage.setItem(THEME_KEY,theme); } });
      })();

      // Auth & Drive
      window.addEventListener('load',()=>{ tokenClient=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:SCOPES,callback:handleTokenResponse}); });
      function handleTokenResponse(tr){ if(tr.error){ toast('Login failed'); hideLoading(); return; } accessToken=tr.access_token; loadUserInfo().then(loadDriveFiles).then(showApp); }
      $('login-btn').addEventListener('click',()=>{ showLoading(); tokenClient.requestAccessToken({prompt:'select_account consent'}); });
      $('logout-btn').addEventListener('click',()=>{ if(confirm('Sign out?')) doLogout(); });
      function doLogout(){ if(accessToken) google.accounts.oauth2.revoke(accessToken,()=>{}); accessToken=null; userInfo=null; items=[]; results={}; showLogin(); }
      function showLogin(){ $('login-screen').classList.add('active'); $('app-screen').classList.remove('active'); }
      function showApp(){ hideLoading(); $('login-screen').classList.remove('active'); $('app-screen').classList.add('active'); if(userInfo?.picture){ $('user-avatar').src=userInfo.picture; $('user-avatar').style.display='block'; } }
      async function apiGet(url){ const r=await fetch(url,{headers:{Authorization:`Bearer ${accessToken}`}}); if(!r.ok) throw new Error(r.status); return r.json(); }
      async function loadUserInfo(){ try{ userInfo=await apiGet('https://www.googleapis.com/oauth2/v2/userinfo'); }catch(e){} }
      async function loadDriveFiles(){
        showLoading();
        try{
          const q=encodeURIComponent("mimeType='application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' and trashed=false");
          const data=await apiGet(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime+desc`);
          driveFiles=data.files||[];
          const sel=$('file-list'); sel.innerHTML='<option value="">— Choose —</option>';
          driveFiles.forEach(f=>{ const o=document.createElement('option'); o.value=f.id; o.textContent=`${f.name} (${new Date(f.modifiedTime).toLocaleDateString()})`; sel.appendChild(o); });
          $('load-btn').disabled=false;
        }catch(e){ toast('Drive error'); }
        hideLoading();
      }
      $('header-file').addEventListener('click',()=>{ $('file-dropdown').classList.toggle('open'); if($('file-dropdown').classList.contains('open')) loadDriveFiles(); });
      $('load-btn').addEventListener('click',async()=>{ const fid=$('file-list').value; if(!fid) return; currentFileId=fid; $('file-dropdown').classList.remove('open'); await loadExcel(fid); });
      async function loadExcel(fileId){
        showLoading();
        try{
          const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${accessToken}`}});
          const buf=await r.arrayBuffer(); const wb=XLSX.read(buf,{type:'array'});
          parseWorkbook(wb); const fname=driveFiles.find(f=>f.id===fileId)?.name||'File'; $('file-status-text').textContent=fname;
          buildCategoryFilter(); startSwipe(); toast(`Loaded ${items.length} items`);
        }catch(e){ toast('Error loading file'); }
        hideLoading();
      }
      function parseWorkbook(wb){
        items=[]; results={};
        const SKIP=['TOTAL','GIFT SHOP','INVENTORY','PRODUCT','ITEM'];
        wb.SheetNames.forEach(sn=>{
          const sheet=wb.Sheets[sn]; const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''}); let cat=sn;
          rows.forEach(row=>{ if(!row||row.length<2) return; const name=String(row[0]||'').trim(); if(!name||SKIP.some(k=>name.toUpperCase().includes(k))) return; const open=parseFloat(row[1])||0,add=parseFloat(row[2])||0,close=parseFloat(row[3])||0,price=parseFloat(row[5])||0; if(open===0&&price===0) return; items.push({name,category:cat,open,add,close,price,sheet:sn}); });
        });
      }

      function buildCategoryFilter(){
        const cats=['All',...new Set(items.map(i=>i.category))];
        const bar=$('cat-filter-bar'); bar.innerHTML='';
        cats.forEach(cat=>{
          const chip=document.createElement('button'); chip.className='cat-chip'+(cat==='All'?' active':'');
          chip.textContent=cat==='All'?`All (${items.length})`:cat;
          chip.addEventListener('click',()=>{
            activeCategory=cat; document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active')); chip.classList.add('active');
            jumpToCategory(cat);
          });
          bar.appendChild(chip);
        });
        bar.style.display=cats.length>1?'flex':'none';
      }
      function jumpToCategory(cat){
        const firstIdx=items.findIndex(i=>cat==='All'||i.category===cat);
        if(firstIdx!==-1){ currentIndex=firstIdx; renderCard(); }
      }

      function startSwipe(){ currentIndex=0; results={}; undoStack=[]; selectedReviewItems.clear(); updateProgress(); renderCard(); localStorage.removeItem(AUTOSAVE_KEY); }
      function updateProgress(){
        const total=items.length, done=Math.min(currentIndex,total), pct=total? (done/total)*100:0;
        $('progress-fill').style.width=`${pct}%`; $('progress-label').textContent=`${done} / ${total}`;
        const saved=Object.keys(results).length;
        $('generate-btn').disabled=saved===0; $('csv-btn').disabled=saved===0;
      }
      function updateQuickStats(){
        const saved=Object.keys(results); if(!saved.length){ $('quick-stats-bar').style.display='none'; return; }
        $('quick-stats-bar').style.display='flex'; $('qs-saved').textContent=saved.length;
        let val=0,closeSum=0,low=0;
        saved.forEach(name=>{ const item=items.find(i=>i.name===name); if(item){ const cv=results[name].close; val+=cv*item.price; closeSum+=cv; if(isLowStock(item,cv)) low++; } });
        $('qs-value').textContent='$'+val.toFixed(0); $('qs-avg').textContent=saved.length?Math.round(closeSum/saved.length):'—'; $('qs-low').textContent=low;
      }
      function isLowStock(item,closeVal){ const thresh=getLowStockThreshold(item); return closeVal<thresh&&item.open>0; }
      function getLowStockThreshold(item){ try{ const hist=JSON.parse(localStorage.getItem(HISTORY_KEY)||'{}'); const h=hist[item.name]||[]; if(h.length>=2){ const avg=h.reduce((s,x)=>s+x.close,0)/h.length; return Math.round(avg*0.4); } }catch(e){} return Math.round(item.open*0.3)||5; }

      function renderCard(){
        updateProgress(); updateQuickStats();
        if(!items.length){ $('swipe-zone').innerHTML='<div style="text-align:center;padding:40px;">No items</div>'; return; }
        if(currentIndex>=items.length){ $('swipe-zone').innerHTML=`<div style="text-align:center;padding:40px;">🎉 All done! <button onclick="startSwipe()" style="margin-top:12px;padding:8px 20px;background:var(--surface-2);border-radius:20px;">Start Over</button></div>`; return; }
        const item=items[currentIndex]; const isLow=isLowStock(item,item.close);
        $('swipe-zone').innerHTML=`
          <div class="card-stack"><div class="inv-card${isLow?' low-stock':''}" id="cur-card">
            <span class="swipe-ind save" id="ind-save">✅ Save</span><span class="swipe-ind skip" id="ind-skip">⏭ Skip</span>
            <div class="card-cat-pill">📁 ${esc(item.category)}${isLow?`<span class="low-stock-badge">⚠ Low</span>`:''}</div>
            <div class="card-name-row">${prodIcon(item.name)}<div class="card-prod-name">${esc(item.name)}</div></div>
            ${historyHtml(item.name)}
            <div class="card-stats"><div class="stat-chip"><div class="stat-label">Open</div><div class="stat-val">${item.open}</div></div><div class="stat-chip"><div class="stat-label">Last Close</div><div class="stat-val">${item.close||'—'}</div></div><div class="stat-chip"><div class="stat-label">Price</div><div class="stat-val">$${item.price.toFixed(2)}</div></div></div>
            <div class="quick-presets"><span style="font-size:0.55rem;color:var(--text-muted);">Quick:</span>${[1,5,10,20,50].map(v=>`<button class="preset-chip" data-preset="${v}">${v}</button>`).join('')}</div>
            <div class="inp-row">
              <div class="inp-col"><div class="inp-col-label">📥 Add</div><div class="inp-wrap-sm"><button class="stepper-btn" data-target="inp-add" data-delta="-1">−</button><input class="card-input" id="inp-add" value="0" min="0" inputmode="numeric"><button class="stepper-btn" data-target="inp-add" data-delta="1">+</button></div></div>
              <div class="inp-col"><div class="inp-col-label">📦 Close</div><div class="inp-wrap-sm"><button class="stepper-btn" data-target="inp-close" data-delta="-1">−</button><input class="card-input" id="inp-close" value="${item.close}" min="0" inputmode="numeric"><button class="stepper-btn" data-target="inp-close" data-delta="1">+</button></div></div>
            </div>
            <div class="cost-preview" id="cost-preview">—</div>
            <div class="card-btns"><button class="btn-skip-c" id="btn-skip">⬅ Skip</button><button class="btn-save-c" id="btn-save">Save ➡</button></div>
          </div></div>`;
        const card=$('cur-card'), addInp=$('inp-add'), closeInp=$('inp-close'), costPrev=$('cost-preview');
        function updateCost(){ const c=parseFloat(closeInp.value)||0,a=parseFloat(addInp.value)||0; costPrev.textContent=`Usage: ${Math.max(0,item.open+a-c)} · Value: $${(c*item.price).toFixed(2)}`; card.classList.toggle('low-stock', isLowStock(item,c)); }
        addInp.addEventListener('input',updateCost); closeInp.addEventListener('input',updateCost); updateCost();
        card.querySelectorAll('.preset-chip').forEach(ch=>ch.addEventListener('click',()=>{ addInp.value=ch.dataset.preset; addInp.dispatchEvent(new Event('input')); }));
        card.querySelectorAll('.stepper-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const targ=document.getElementById(btn.dataset.target); const d=parseInt(btn.dataset.delta); targ.value=Math.max(0,(parseInt(targ.value)||0)+d); updateCost(); }); });
        $('btn-save').addEventListener('click',()=>swipeCard('right')); $('btn-skip').addEventListener('click',()=>swipeCard('left'));
        closeInp.addEventListener('keydown',e=>{ if(e.key==='Enter') swipeCard('right'); });
        let startX,startY,isDragging,isHoriz;
        const dragStart=(x,y,tgt)=>{ if(isProcessing||tgt.closest('button')||tgt.closest('input')) return; isDragging=true; isHoriz=false; startX=x; startY=y; card.classList.add('dragging'); };
        const dragMove=(x,y)=>{ if(!isDragging) return; const dx=x-startX,dy=y-startY; if(!isHoriz){ if(Math.abs(dx)<5&&Math.abs(dy)<5) return; isHoriz=Math.abs(dx)>Math.abs(dy); if(!isHoriz){ isDragging=false; card.classList.remove('dragging'); return; } } card.style.transform=`translateX(${dx}px) rotate(${dx*0.03}deg)`; card.style.opacity=String(1-Math.abs(dx)/300); $('ind-save').style.opacity=dx>30?String(Math.min(1,(dx-30)/50)):'0'; $('ind-skip').style.opacity=dx<-30?String(Math.min(1,(-dx-30)/50)):'0'; };
        const dragEnd=x=>{ if(!isDragging) return; isDragging=false; card.classList.remove('dragging'); const d=x-startX; if(d>70) swipeCard('right'); else if(d<-70) swipeCard('left'); else{ card.style.transform=''; card.style.opacity='1'; $('ind-save').style.opacity='0'; $('ind-skip').style.opacity='0'; } };
        card.addEventListener('mousedown',e=>dragStart(e.clientX,e.clientY,e.target)); document.addEventListener('mousemove',e=>dragMove(e.clientX,e.clientY)); document.addEventListener('mouseup',e=>dragEnd(e.clientX));
        card.addEventListener('touchstart',e=>dragStart(e.touches[0].clientX,e.touches[0].clientY,e.target),{passive:true}); card.addEventListener('touchmove',e=>{ if(isDragging&&isHoriz) e.preventDefault(); dragMove(e.touches[0].clientX,e.touches[0].clientY); },{passive:false}); card.addEventListener('touchend',e=>dragEnd(e.changedTouches[0].clientX));
        closeInp.focus();
      }

      function swipeCard(dir){
        if(isProcessing) return; const card=$('cur-card'); if(!card) return; isProcessing=true;
        const item=items[currentIndex]; undoStack.push({index:currentIndex,item,savedData:results[item.name]||null,dir});
        if(dir==='right'){ const close=parseFloat($('inp-close')?.value)||0, add=parseFloat($('inp-add')?.value)||0; results[item.name]={close,add,sheet:item.sheet}; card.style.transform='translateX(120%) rotate(12deg)'; card.style.opacity='0'; }
        else{ card.style.transform='translateX(-120%) rotate(-12deg)'; card.style.opacity='0'; }
        showUndo(dir==='right'?`✅ Saved "${item.name}"`:`⏭ Skipped "${item.name}"`);
        setTimeout(()=>{ currentIndex++; isProcessing=false; renderCard(); },300);
      }
      let undoTimer;
      function showUndo(msg){ clearTimeout(undoTimer); $('undo-msg').textContent=msg; $('undo-bar').classList.add('show'); undoTimer=setTimeout(()=>$('undo-bar').classList.remove('show'),3000); }
      $('undo-btn').addEventListener('click',()=>{ if(!undoStack.length) return; $('undo-bar').classList.remove('show'); const last=undoStack.pop(); currentIndex=last.index; if(last.savedData) results[last.item.name]=last.savedData; else delete results[last.item.name]; isProcessing=false; renderCard(); toast('↩ Undone'); });

      function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      const ICON_COLORS=['#1e6b3a','#c0392b','#2471a3','#e67e22','#8e6b3e'];
      function iconColor(n){ let h=0; for(let i=0;i<n.length;i++) h+=n.charCodeAt(i); return ICON_COLORS[h%ICON_COLORS.length]; }
      function prodIcon(n){ return `<span class="prod-icon" style="background:${iconColor(n)}">${n.charAt(0).toUpperCase()}</span>`; }
      function historyHtml(name){ try{ const hist=JSON.parse(localStorage.getItem(HISTORY_KEY)||'{}'); const h=hist[name]||[]; if(!h.length) return ''; return `<div class="history-box">📊 ${h.slice(-3).map(x=>`<span class="hist-tag">${x.month}: ${x.close}</span>`).join('')}</div>`; }catch(e){return '';} }

      // Review & Summary (simplified)
      document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',function(){
        document.querySelectorAll('[data-tab]').forEach(x=>x.classList.remove('active')); this.classList.add('active');
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        $('view-'+this.dataset.tab).classList.add('active');
        if(this.dataset.tab==='review') renderReview(); if(this.dataset.tab==='summary') renderSummary();
      }));
      function renderReview(){
        const list=$('review-content'); list.innerHTML='';
        const saved=Object.keys(results); if(!saved.length){ list.innerHTML='<div style="text-align:center;padding:40px;">No items saved.</div>'; return; }
        saved.forEach(name=>{ const item=items.find(i=>i.name===name); if(!item) return; const d=results[name]; list.innerHTML+=`<div style="display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:12px;padding:8px;margin-bottom:4px;"><span style="font-weight:700;">${esc(name)}</span> <span style="margin-left:auto;">Close: ${d.close}</span></div>`; });
      }
      function renderSummary(){
        const s=$('summary-content'); s.innerHTML='';
        const saved=Object.keys(results); let val=0; saved.forEach(n=>{ const i=items.find(x=>x.name===n); if(i) val+=results[n].close*i.price; });
        s.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div class="kpi-card"><div class="kpi-label">Saved</div><div class="kpi-value">${saved.length}</div></div><div class="kpi-card"><div class="kpi-label">Value</div><div class="kpi-value">$${val.toFixed(0)}</div></div></div>`;
      }

      $('csv-btn').addEventListener('click',()=>{
        const saved=Object.keys(results); if(!saved.length) return;
        let csv='Product,Category,Open,Add,Close,Price,Value\n';
        saved.forEach(n=>{ const i=items.find(x=>x.name===n); if(!i) return; const d=results[n]; csv+=`"${n}","${i.category}",${i.open},${d.add},${d.close},${i.price.toFixed(2)},${(d.close*i.price).toFixed(2)}\n`; });
        const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='inventory.csv'; a.click();
      });
      async function generateReport(){
        if(!Object.keys(results).length) return; showLoading();
        try{
          const r=await fetch(`https://www.googleapis.com/drive/v3/files/${currentFileId}?alt=media`,{headers:{Authorization:`Bearer ${accessToken}`}});
          const buf=await r.arrayBuffer(); const wb=XLSX.read(buf,{type:'array'});
          wb.SheetNames.forEach(sn=>{ const sheet=wb.Sheets[sn]; const rows=XLSX.utils.sheet_to_json(sheet,{header:1}); rows.forEach((row,ri)=>{ const name=String(row[0]||'').trim(); if(!name||!results[name]) return; const saved=results[name]; const setCell=(col,val)=>{ const addr=XLSX.utils.encode_cell({r:ri,c:col}); if(!sheet[addr]) sheet[addr]={}; sheet[addr].v=val; sheet[addr].t='n'; }; setCell(2,saved.add); setCell(3,saved.close); setCell(4,parseFloat(row[1])+saved.add-saved.close); setCell(6,(parseFloat(row[1])+saved.add-saved.close)*parseFloat(row[5])); setCell(7,saved.close*parseFloat(row[5])); }); });
          const wbOut=XLSX.write(wb,{bookType:'xlsx',type:'array'}); const blob=new Blob([wbOut],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
          const meta=new Blob([JSON.stringify({name:`Report_${new Date().toISOString().slice(0,10)}.xlsx`,mimeType:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})],{type:'application/json'});
          const fd=new FormData(); fd.append('metadata',meta); fd.append('file',blob);
          const up=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${accessToken}`},body:fd});
          if(!up.ok) throw new Error('Upload failed'); const data=await up.json(); toast('✅ Report saved!'); localStorage.removeItem(AUTOSAVE_KEY);
        }catch(e){ toast('Error: '+e.message); }
        hideLoading();
      }
      $('generate-btn').addEventListener('click',generateReport);
      // Autosave resume
      function autosave(){ if(currentFileId) localStorage.setItem(AUTOSAVE_KEY,JSON.stringify({fileId:currentFileId,currentIndex,results,timestamp:Date.now()})); }
      window.addEventListener('beforeunload',()=>{ if(Object.keys(results).length) autosave(); });
      (function checkResume(){ try{ const saved=JSON.parse(localStorage.getItem(AUTOSAVE_KEY)); if(saved&&Object.keys(saved.results).length){ if(confirm('Resume previous session?')){ currentFileId=saved.fileId; loadExcel(saved.fileId).then(()=>{ results=saved.results; currentIndex=saved.currentIndex; renderCard(); }); } } }catch(e){} })();
    })();
  </script>
</body>
</html>
